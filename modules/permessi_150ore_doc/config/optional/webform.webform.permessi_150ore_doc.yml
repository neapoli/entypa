      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
  indirizzo:
    '#type': textfield
    '#title': 'Residente in'
    '#placeholder': 'Inserire Via, numero - CAP Città (sigla Provincia)'
    '#required': true
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
  iscrizione_presso:
    '#type': textfield
    '#title': 'Iscrizione presso:'
    '#placeholder': 'Precisare la sede di iscrizione dello studio'
    '#required': true
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
  processed_text:
    '#type': processed_text
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#display_on': both
    '#text': '<p class="text-align-center"><strong>CHIEDE</strong></p><p>I seguenti giorni di permesso straordinario retribuito per il diritto allo studio ai sensi dell''art. 3 del D.P.R. 395/1988 e dell''art.15, comma 7, del C.C.N.L. per il comparto Scuola.</p>'
    '#format': bootstrap_italia_2
  permesso_orario:
    '#type': webform_custom_composite
    '#title': 'Permesso orario'
    '#required': true
    '#multiple__sorting': false
    '#multiple__add_more': false
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#element':
      giorno:
        '#type': date
        '#required': true
        '#title': Giorno
      ora_inizio:
        '#type': webform_time
        '#required': true
        '#title': 'Dalle ore'
      ora_fine:
        '#type': webform_time
        '#required': true
        '#title': 'Alle ore'
      totale_ore:
        '#type': textfield
        '#title': 'Totale ore'
