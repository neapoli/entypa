elements: |-
  dati_anagrafici:
    '#type': webform_flexbox
    '#align_items': center
    markup:
      '#type': webform_markup
      '#flex': 0
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
      '#markup': '<p>Il/La sottoscritto/a</p>'
    cognome:
      '#type': textfield
      '#title': Cognome
      '#autocomplete': 'off'
      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#flex': 2
      '#default_value': '[current-user:field_cognome]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    nome:
      '#type': textfield
      '#title': Nome
      '#autocomplete': 'off'
      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#flex': 2
      '#default_value': '[current-user:field_nome]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    codice_fiscale:
      '#type': textfield
      '#title': 'Codice Fiscale'
      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#default_value': '[current-user:field_codice_fiscale]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
  flexbox:
    '#type': webform_flexbox
    '#attributes':
      style: 'margin-top: 30px'
    sede_di_servizio:
      '#type': textfield
      '#title': 'In servizio presso: '
      '#autocomplete': 'off'
      '#readonly': true
      '#flex': 3
      '#default_value': '[current-user:field_sede_di_servizio]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    in_qualita_di_:
      '#type': textfield
      '#title': 'In qualità di: '
      '#autocomplete': 'off'
      '#readonly': true
      '#flex': 2
      '#default_value': '[current-user:field_qualifica]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    a_tempo:
