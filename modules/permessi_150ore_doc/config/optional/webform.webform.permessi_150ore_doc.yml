      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
  richiesta_annullamento:
    '#type': number
    '#title': 'Richiesta Annullamento'
    '#default_value': '0'
    '#access': false
css: ".referenti-plesso {\r\n  visibility: hidden;\r\n}"
javascript: "(function ($) {                                                                                                                                                                     \r\n  function toMin(t) {\r\n    if (!t) return 0;                                                                                                                                                               \r\n    var p = t.split(':');                                                                                                                                                         \r\n    return p.length < 2 ? 0 : parseInt(p[0], 10) * 60 + parseInt(p[1], 10);                                                                                                         \r\n  }\r\n  function formatOre(min) {                                                                                                                                                         \r\n    if (min <= 0) return '';\r\n    var h = Math.floor(min / 60);                                                                                                                                                   \r\n    var m = min % 60;                                                                                                                                                               \r\n    return h + 'h' + (m ? ' ' + m + 'min' : '');\r\n  }\r\n  function calcTotaleOre($row) {\r\n    var diff = toMin($row.find('input[name*=\"[ora_fine]\"]').val()) - toMin($row.find('input[name*=\"[ora_inizio]\"]').val());                                                                   $row.find('input[name*=\"[totale_ore]\"]').val(formatOre(diff));                                                                                                                  \r\n  }\r\n  function calcTotaleGenerale() {                                                                                                                                                   \r\n    var totMin = 0;\r\n    $('input[name*=\"permesso_orario\"][name*=\"[ora_inizio]\"]').each(function () {                                                                                                    \r\n      var $row = $(this).closest('tr');                                                                                                                                             \r\n      var diff = toMin($row.find('input[name*=\"[ora_fine]\"]').val()) - toMin($(this).val());\r\n      if (diff > 0) totMin += diff;                                                                                                                                                 \r\n    });                                                                                                                                                                           \r\n    $('input[name=\"per_un_totale_di_ore\"]').val(formatOre(totMin));                                                                                                                 \r\n  }\r\n  $(document).on(                                                                                                                                                                   \r\n    'change',                                                                                                                                                                     \r\n    'input[name*=\"permesso_orario\"][name*=\"[ora_inizio]\"], input[name*=\"permesso_orario\"][name*=\"[ora_fine]\"]',\r\n    function () {                                                                                                                                                                   \r\n      calcTotaleOre($(this).closest('tr'));\r\n      calcTotaleGenerale();                                                                                                                                                         \r\n    }                                                                                                                                                                             \r\n  );                                                                                                                                                                                \r\n}(jQuery));"
