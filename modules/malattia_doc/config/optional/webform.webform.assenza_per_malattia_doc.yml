css: ''
javascript: "(function ($) {  \r\n  $('input[name=\"data_inizio\"]').change(function(){\r\n    Controllo();\r\n  });\r\n  $('input[name=\"data_fine\"]').change(function(){\r\n    Controllo();\r\n  });\r\n  function Controllo() {\r\n    var date1 = document.getElementById(\"edit-data-inizio\").value;\r\n    var date2 = document.getElementById(\"edit-data-fine\").value;\r\n    //alert(date1);\r\n    //alert(date2);\r\n    dt1 = new Date(date1);\r\n    dt2 = new Date(date2);\r\n    giorni = Math.floor((Date.UTC(dt2.getFullYear(), dt2.getMonth(), dt2.getDate()) - Date.UTC(dt1.getFullYear(), dt1.getMonth(), dt1.getDate()) ) /(1000 * 60 * 60 * 24));\r\n    //alert (prova);\r\n    document.getElementById(\"edit-numero-giorni\").value = giorni + 1;\r\n  }\r\n}(jQuery));"
