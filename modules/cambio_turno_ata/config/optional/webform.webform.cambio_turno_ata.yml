css: ''
javascript: "(function ($) {\r\n  $('input[name=\"turno_previsto_dalle_ore\"]').change(function(){\r\n    SommaTime();\r\n  });\r\n  $('input[name=\"turno_previsto_alle_ore\"]').change(function(){\r\n    SommaTime();\r\n  });\r\n  \r\n  $('input[name=\"turno_modificato_dalle_ore\"]').change(function(){\r\n    SommaTime2();\r\n  });\r\n  $('input[name=\"turno_modificato_alle_ore\"]').change(function(){\r\n    SommaTime2();\r\n  });\r\n  \r\n  $('input[name=\"turno_previsto_totale_ore\"]').attr('readonly','readonly');\r\n  $('input[name=\"turno_modificato_totale_ore\"]').attr('readonly','readonly');\r\n  \r\n  function SommaTime() {\r\n    var time1 = document.getElementById(\"edit-turno-previsto-dalle-ore\").value;\r\n    var time2 = document.getElementById(\"edit-turno-previsto-alle-ore\").value;\r\n    //alert(time1);\r\n        \r\n    var hour = 0;\r\n    var minute = 0;\r\n        \r\n    var splitTime1= time1.split(':');\r\n    var splitTime2= time2.split(':');\r\n        \r\n    hour = parseInt(splitTime2[0])-parseInt(splitTime1[0]);\r\n    minute = parseInt(splitTime2[1])-parseInt(splitTime1[1]);\r\n    hour = Math.floor(hour + minute/60);\r\n    if (hour < 10) hour = \"0\" + hour;\r\n    minute = minute%60;\r\n    if (minute < 10) minute = \"0\" + minute;\r\n    \r\n    //alert('sum of above time= '+hour+':'+minute);\r\n    document.getElementById(\"edit-turno-previsto-totale-ore\").value = hour+':'+minute;\r\n  }\r\n  \r\n  function SommaTime2() {\r\n    var time3 = document.getElementById(\"edit-turno-modificato-dalle-ore\").value;\r\n    var time4 = document.getElementById(\"edit-turno-modificato-alle-ore\").value;\r\n    //alert(time1);\r\n        \r\n    var hour = 0;\r\n    var minute = 0;\r\n        \r\n    var splitTime3= time3.split(':');\r\n    var splitTime4= time4.split(':');\r\n        \r\n    hour = parseInt(splitTime4[0])-parseInt(splitTime3[0]);\r\n    minute = parseInt(splitTime4[1])-parseInt(splitTime3[1]);\r\n    hour = Math.floor(hour + minute/60);\r\n    if (hour < 10) hour = \"0\" + hour;\r\n    minute = minute%60;\r\n    if (minute < 10) minute = \"0\" + minute;\r\n    \r\n    //alert('sum of above time= '+hour+':'+minute);\r\n    document.getElementById(\"edit-turno-modificato-totale-ore\").value = hour+':'+minute;\r\n  }\r\n}(jQuery));"
