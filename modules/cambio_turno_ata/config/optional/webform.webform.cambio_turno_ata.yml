      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#flex': 2
      '#default_value': '[current-user:field_cognome]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    nome:
      '#type': textfield
      '#title': Nome
      '#autocomplete': 'off'
      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#flex': 2
      '#default_value': '[current-user:field_nome]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    codice_fiscale:
