uid: 1
template: false
archive: false
id: adesione_a_commissioni
title: 'Adesione a Commissioni'
description: 'Form per la Modulistica del Personale'
category: 'Modulistica DOCENTI / ATA'
elements: |-
  dati_anagrafici:
    '#type': webform_flexbox
    '#align_items': center
    markup:
      '#type': webform_markup
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - amministratore
      '#access_view_roles':
        - authenticated
      '#display_on': both
      '#markup': '<p>Il/La sottoscritto/a</p>'
    cognome:
      '#type': textfield
      '#title': Cognome
      '#readonly': true
      '#input_mask': '''casing'': ''upper'''
      '#default_value': '[current-user:field_cognome]'
    nome:
      '#type': textfield
      '#title': Nome
      '#readonly': true
      '#input_mask': '''casing'': ''upper'''
      '#default_value': '[current-user:field_nome]'
    codice_fiscale:
      '#type': textfield
      '#title': 'Codice Fiscale'
      '#readonly': true
      '#input_mask': '''casing'': ''upper'''
      '#required': true
      '#default_value': '[current-user:field_codice_fiscale]'
  flexbox:
    '#type': webform_flexbox
    '#attributes':
      style: 'margin-top: 30px'
    '#align_items': center
    sede_di_servizio:
      '#type': textfield
      '#title': 'In servizio presso:'
      '#readonly': true
      '#flex': 2
      '#default_value': '[current-user:field_sede_di_servizio]'
    in_qualita_di_:
      '#type': textfield
      '#title': 'In qualità di:'
      '#readonly': true
      '#default_value': '[current-user:field_qualifica]'
    a_tempo:
      '#type': textfield
      '#title': 'A Tempo:'
      '#readonly': true
      '#default_value': '[current-user:field_tipologia_incarico:entity]'
  processed_text:
    '#type': processed_text
    '#display_on': both
    '#text': |
      <p class="text-align-center"><strong>COMUNICA</strong></p>

      <p>con la presente, la propria disponibilità a partecipare ai lavori delle Commissioni /Gruppi di lavoro sottoindicati e programmati per l'anno scolastico in corso:</p>
    '#format': bootstrap_italia_2
  commissione:
    '#type': checkboxes
    '#title': Commissione
    '#options': commissioni
    '#required': true
  note:
    '#type': textarea
    '#title': Note
    '#wrapper_attributes':
      style: 'margin-top: 50px'
  data_firma:
    '#type': webform_flexbox
    '#attributes':
      style: 'margin-top: 50px'
    data_di_invio:
      '#type': date
      '#title': 'Data compilazione'
      '#title_display': inline
      '#disabled': true
      '#default_value': today
      '#format': bootstrap_italia_short_date
      '#date_date_format': ''
    firma_digitale:
      '#type': textarea
      '#title': FIRMA
      '#rows': 3
      '#disabled': true
      '#flex': 0
      '#default_value': |-
        [current-user:field_cognome] [current-user:field_nome]
        C.F. [current-user:field_codice_fiscale]
        E-mail: [current-user:mail]
      '#format': raw
  file_pdf:
    '#type': 'webform_entity_print_attachment:pdf'
    '#title': 'File PDF'
    '#display_on': view
    '#filename': '[webform_submission:source-title]_[webform_submission:values:cognome]_[webform_submission:values:nome].pdf'
  istituto:
    '#type': hidden
    '#title': Istituto
    '#default_value': '[site:name]'
  mail_istituto:
    '#type': hidden
    '#title': 'Mail Istituto'
    '#default_value': '[site:mail]'
  mail_user:
    '#type': hidden
    '#title': 'Mail user'
    '#default_value': '[current-user:mail]'
  richiesta_annullamento:
    '#type': number
    '#title': 'Richiesta Annullamento'
    '#default_value': '0'
    '#access': false
