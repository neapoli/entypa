    '#text': |
      <p><strong>Lutto familiare</strong> - Perdita del coniuge, di parenti entro il secondo grado, di soggetto componente la famiglia anagrafica o convivente stabile e di affini di primo grado: gg. 3 per evento, anche non continuativi.</p>
    '#format': bootstrap_italia_2
  matrimonio:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="tipologia_richiesta"]':
          value: Matrimonio
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': |
      <p><strong>Matrimonio </strong>- Permesso retribuito di quindici giorni consecutivi in occasione del matrimonio, con decorrenza indicata dal dipendente medesimo ma comunque fruibili da una settimana prima a due mesi successivi al matrimonio stesso. Il personale, che intende usufruire dei 15 giorni di permesso per matrimonio, deve presentare la richiesta al dirigente scolastico con ragionevole anticipo (eccetto i casi in cui vi siano motivi urgenti e imprevedibili). Il dipendente dovrà produrre, a giustificazione dell’assenza, il certificato del matrimonio rilasciato dall’ufficiale di stato o una dichiarazione sostitutiva di certificazione comprovante l’avvenuto matrimonio</p>
    '#format': bootstrap_italia_2
  donazione_sangue:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="tipologia_richiesta"]':
          value: 'Donazione di sangue e/o emocomponenti'
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': |
      <p><strong>Donazione di sangue e/o emocomponenti</strong> - Il dipendente è tenuto a comunicare preventivamente l’assenza e a produrre, al suo rientro in servizio, idonea certificazione rilasciata dalla struttura sanitaria autorizzata dal Ministero della Sanità. Il dipendente, una volta effettuata la donazione, dovrà farsi rilasciare, dal medico che ha effettuato il prelievo, un certificato, che presenterà a scuola, su carta intestata del centro (ricordiamo che la struttura sanitaria dev’essere autorizzata dal Ministero della Sanità) presso il quale è stato effettuato il prelievo a titolo gratuito dal quale risultino i dati anagrafici del donatore, gli estremi di un documento di riconoscimento, data e ora del prelievo, quantitativo prelevato (almeno 250 grammi). Detto quantitativo dovrà risultare necessariamente dalla certificazione rilasciata dal centro trasfusionale. I donatori di sangue e di emocomponenti hanno diritto ad astenersi dal lavoro per l’intera giornata in cui effettuano la donazione, conservando la normale retribuzione per l’intera giornata lavorativa. La giornata di riposo viene computata in 24 ore a partire dal momento in cui il lavoratore si è assentato dal lavoro per l’operazione di prelievo del sangue”. È fissato in 250 grammi il limite quantitativo minimo che la donazione di sangue deve raggiungere per il diritto alla giornata di riposo e alla relativa retribuzione. La donazione del sangue deve essere gratuita e il prelievo dev’essere effettuato presso Centri autorizzati (Centro di raccolta fisso o mobile oppure presso un Centro trasfusionale, oppure presso un Centro di produzione di emoderivati regolarmente autorizzati dal Ministero della Sanità). Il dipendente non può usufruire della giornata di riposo il lunedì se il prelievo è stato effettuato alla domenica. Nel caso venga riscontrata la non idoneità alla donazione il permesso viene corrisposto limitatamente al tempo necessario all’accertamento dell’idoneità. Nel caso quindi in cui il lavoratore si sia recato al centro per donare il proprio sangue e la donazione, per motivi di ordine sanitario, non abbia potuto essere effettuata, o sia stata effettuata solo parzialmente, il medico addetto al prelievo dovrà rilasciare al lavoratore un certificato, con l’indicazione del giorno e dell’ora, in cui si attesta la mancata o parziale donazione. In quest’ipotesi (inidoneità alla donazione) la retribuzione dei donatori lavoratori dipendenti è garantita limitatamente al tempo necessario all’accertamento dell’idoneità e alle relative procedure. Pertanto, in questi casi il dipendente deve recuperare le ore di assenza in quanto non giustificate da alcuna donazione. Solo nel caso il dipendente fornisse una certificazione attestante il tempo trascorso nel centro in attesa della donazione poi non effettuata, e questo tempo coprisse totalmente l'orario di servizio previsto per quel giorno, tale periodo non andrà recuperato e l'intera giornata di assenza dal lavoro si ritiene "giustificata".</p>
    '#format': bootstrap_italia_2
  donazione_midollo:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="tipologia_richiesta"]':
          value: 'Donazione midollo osseo'
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': |
      <p><strong>Donazione midollo osseo</strong> - L’art. 5 della legge 52/2001 riconosce al lavoratore dipendente, il diritto a conservare la “normale retribuzione” per le giornate di degenza ospedaliera occorrenti al prelievo del sangue midollare nonché per le successive giornate di convalescenza che l’équipe medica che ha effettuato il trapianto ritenga necessarie ai fini del completo ripristino dello stato fisico del donatore stesso. La legge prevede inoltre il diritto a conservare la normale retribuzione anche per i permessi orari concessi al lavoratore per il tempo occorrente all’espletamento dei seguenti atti preliminari alla donazione (art. 5, comma 1):</p>

      <ul>
      	<li>prelievo finalizzato all’individuazione dei dati genetici (definizione del sistema genetico HLA);</li>
      	<li>prelievi necessari all’approfondimento della compatibilità con i pazienti in attesa di trapianto;</li>
      	<li>accertamento dell’idoneità alla donazione.</li>
      </ul>

      <p>Rientreranno nei permessi eventuali giorni necessari a raggiungere la sede degli accertamenti e della donazione.</p>
    '#format': bootstrap_italia_2
  citazione_testimone:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="tipologia_richiesta"]':
          value: "Citazione a testimoniare a favore dell'Amministrazione"
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': |
      <p><strong>Citazione a testimoniare a favore dell'Amministrazione</strong> - Il dipendente della scuola (docente e ATA assunto a tempo indeterminato e determinato anche per supplenza breve) chiamato a rendere testimonianza in un giudizio civile o penale non può sottrarsi all’assolvimento di tale compito pena l’incorrere nelle sanzioni previste dalla legge (art. 255 Codice di procedura civile; artt. 132 e 133 Codice di procedura penale). L’ARAN con pareri dell’8 luglio 2004 e 1 aprile 2005 per il Comparto Ministeri afferma che: “Nel caso in cui il dipendente chieda di assentarsi dal servizio per rendere una testimonianza svolta nell’interesse dell’Amministrazione, tale assenza verrà giustificata o per l’intera giornata o per il tempo necessario all’assolvimento di tale compito. Nel caso in cui l’assenza sia dovuta per rendere una testimonianza giudiziale ed essa non è svolta nell’interesse dell’Amministrazione, essa sarà imputata a ferie, permesso a recupero o permesso per particolari motivi personali”.</p>
    '#format': bootstrap_italia_2
  cariche_elettive:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="tipologia_richiesta"]':
          value: 'Ricoprire Cariche Pubbliche Elettive'
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': |
      <p><strong>Art. 38 - CCNL Contratto scuola - Permessi ed Assenze del Personale Docente Chiamato a Ricoprire Cariche Pubbliche Elettive</strong></p>

      <ol>
      	<li>Nei confronti del personale docente chiamato a ricoprire cariche elettive, si applicano le norme di cui al d.lgs 18.08.2000, n. 267 e di cui all'art. 68 del d.lgs. 30 marzo 2001, n. 165. Il personale che si avvalga del regime delle assenze e dei permessi di cui alle leggi predette, è tenuto a presentare, ogni trimestre, a partire dall'inizio dell'anno scolastico, alla scuola in cui presta servizio, apposita dichiarazione circa gli impegni connessi alla carica ricoperta, da assolvere nel trimestre successivo, nonché a comunicare mensilmente alla stessa scuola la conferma o le eventuali variazioni degli impegni già dichiarati.</li>
      	<li>Nel caso in cui il docente presti servizio in più scuole, la predetta dichiarazione va presentata a tutte le scuole interessate.</li>
      	<li>Qualora le assenze dal servizio derivanti dall'assolvimento degli impegni dichiarati non consentano al docente di assicurare la necessaria continuità didattica nella classe o nelle classi cui sia assegnato può farsi luogo alla nomina di un supplente per il periodo strettamente indispensabile e, comunque, sino al massimo di un mese, durata prorogabile soltanto ove se ne ponga l'esigenza in relazione a quanto dichiarato nella comunicazione mensile di cui al comma 1, sempreché non sia possibile provvedere con altro personale docente in soprannumero o a disposizione.</li>
      	<li>Per tutta la durata della nomina del supplente il docente, nei periodi in cui non sia impegnato nell'assolvimento dei compiti connessi alla carica ricoperta, è utilizzato nell'ambito della scuola e per le esigenze di essa, nei limiti dell'orario obbligatorio di servizio. prioritariamente per le supplenze e per i corsi di recupero.</li>
      	<li>La programmazione delle assenze di cui ai precedenti commi 1 e 2 non ha alcun valore sostitutivo della documentazione espressamente richiesta dal D.lgs. n. 267/2000, che dovrà essere prodotta tempestivamente dall'interessato.</li>
      </ol>

      <p>&nbsp;</p>
    '#format': bootstrap_italia_2
