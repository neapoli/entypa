elements: |-
  informazioni:
    '#type': webform_more
    '#more_title': 'Informazioni CCNL (art. 19 Permessi retribuiti)'
    '#more': '<ol><li data-list-item-id="e91a3af2c06950fe385be27ad8cd3f8f2">Al personale assunto a tempo determinato, al personale di cui all''art. 3, comma 6, del D.P.R. n. 399 del 1988 e al personale non licenziabile di cui agli artt. 43 e 44 della legge 20 maggio 1982 n. 270, si applicano, nei limiti della durata del rapporto di lavoro, le disposizioni in materia di ferie, permessi ed assenze stabilite dal presente contratto per il personale assunto a tempo indeterminato, con le precisazioni di cui ai seguenti commi.</li><li data-list-item-id="e5e2e6159da7bc89ca42aebc445cde805">(omissis)</li><li data-list-item-id="e3e8bf1ee8dc15b7219efae178be173dc">(omissis)</li><li data-list-item-id="e6dbcea28186e64c063ed9cd880589497">(omissis)</li><li data-list-item-id="e25c65f7b6efacfa60d6742877c225393">(omissis)</li><li data-list-item-id="e1f46107f2f5f61d8cb0aaad25a542ec0">(omissis)</li><li data-list-item-id="e3e33edab9dd4be5c2fa5954f110cc392">Al personale docente, educativo ed ATA assunto a tempo determinato, ivi compreso quello di cui al precedente comma 5, sono concessi permessi non retribuiti, per la partecipazione a concorsi od esami, nel limite di otto giorni complessivi per anno scolastico, ivi compresi quelli eventualmente richiesti per il viaggio. Sono, inoltre, attribuiti permessi non retribuiti, fino ad un massimo di sei giorni, per i motivi previsti dall''art. 15, comma 2.</li><li data-list-item-id="e9b35c3a0201bca86b8444099ad0c15b7">I periodi di assenza senza assegni interrompono la maturazione dell''anzianità di servizio a tutti gli effetti.</li><li data-list-item-id="ef05be7125c00a597c99de87b1371ae07">Il dipendente di cui al presente articolo ha diritto a tre giorni di permesso retribuito per lutti per perdita del coniuge, di parenti entro il secondo grado, del convivente o di soggetto componente la famiglia anagrafica e di affini di primo grado.</li><li data-list-item-id="eedc9a3f1bff8585acbb2825748f10f51">(omissis)</li><li data-list-item-id="e55ddad7d1b4e7ca69b3a3e990d753c41">(omissis)</li><li data-list-item-id="e26370db055c6c86c8c0c9cf3bb026c9c">Il personale docente ed ATA assunto a tempo determinato ha diritto entro i limiti di durata del rapporto, ad un permesso retribuito di 15 giorni consecutivi in occasione del matrimonio.</li><li data-list-item-id="ebc64bce8429b119bcd5134cac9ca55b1">I permessi di cui ai commi 9 e 12 sono computati nell''anzianità di servizio a tutti gli effetti.</li><li data-list-item-id="e837a1e094f289ecaf49f1c355506c376">Al personale di cui al presente articolo si applicano le norme relative ai congedi parentali come disciplinati dall''art. 12.</li><li data-list-item-id="e6a3478d9af4fbc9cddf9d9aebc8fd6c1">Al personale di cui al presente articolo si applicano le disposizioni relative alle gravi patologie, di cui all''art. 17, comma 9.</li></ol>'
    '#attributes':
      style: 'margin: 20px 0px 50px 0px'
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
