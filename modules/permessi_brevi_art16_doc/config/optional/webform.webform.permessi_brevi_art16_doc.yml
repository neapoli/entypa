        - authenticated
      '#access_view_roles':
        - authenticated
      '#date_date_format': ''
    firma_digitale:
      '#type': textarea
      '#title': FIRMA
      '#rows': 3
      '#disabled': true
      '#flex': 0
      '#default_value': |-
        [current-user:field_cognome] [current-user:field_nome]
        C.F. [current-user:field_codice_fiscale]
        E-mail: [current-user:mail]
