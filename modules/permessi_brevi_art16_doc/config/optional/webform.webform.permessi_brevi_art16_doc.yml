        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    a_tempo:
      '#type': textfield
      '#title': 'A Tempo: '
      '#autocomplete': 'off'
      '#readonly': true
      '#default_value': '[current-user:field_tipologia_incarico:entity]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
  processed_text:
    '#type': processed_text
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': '<div class="text-align-center"><strong>CHIEDE</strong></div><div class="text-align-center">&nbsp;</div><div>di poter usufruire di ore di permesso orario ai sensi dell''art 16 del CCNL contratto scuola e precisamente:</div><div class="text-align-center">&nbsp;</div>'
    '#format': bootstrap_italia_2
  permesso_orario:
    '#type': webform_custom_composite
    '#title': 'Permesso Orario'
    '#required': true
    '#multiple__sorting': false
    '#multiple__add_more': false
    '#multiple__add_more_input': false
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#element':
      giorno:
        '#type': date
        '#required': true
        '#title': Giorno
      ora_inizio:
        '#type': webform_time
        '#required': true
        '#title': 'Dalle Ore'
      ora_fine:
        '#type': webform_time
        '#required': true
        '#title': 'Alle Ore'
      plesso:
        '#type': select
        '#options': plessi_scolastici
        '#required': true
        '#title': 'Plesso Interessato'
      classe:
        '#type': textfield
        '#required': true
        '#title': Classe
  totale_ore:
    '#type': webform_computed_twig
    '#title': 'Totale Ore'
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#template': |-
      {% for item in data.permesso_orario %}
      {# USO ('U') equivalente di strtotime #}
      {% set startTime = item.ora_inizio|date('U') %}
      {% set endTime = item.ora_fine|date('U') %}
      {% set difference = endTime - startTime %}
      {% set sum = difference + sum ?? 0 %}
      {# USO ('UTC') per evitare che aggiunga un'ora per ora legale #}
      {% if loop.last %}{{ sum|date('H:i', 'UTC') }}{% endif %}
      {% endfor %}
    '#store': true
  processed_text_02:
    '#type': processed_text
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': |
      <p><span style="color: red;"><strong>Attenzione</strong></span>: la somma delle ore di permesso richieste verrà <strong>calcolata/aggiornata in automatico</strong> nella pagina di <strong>ANTEPRIMA</strong></p>
    '#format': bootstrap_italia_2
  recupero_permesso:
    '#type': radios
    '#title': 'Recupero permesso'
    '#options':
      'Ore da recuperare entro i due mesi lavorativi successivi alla data della fruizione': 'Ore da recuperare entro i due mesi lavorativi successivi alla data della fruizione'
      'Ore di servizio già prestate': 'Ore di servizio già prestate'
    '#required': true
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
  processed_text_01:
    '#type': processed_text
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
    '#text': |
      <p>Il/la sottoscritto/a, ai sensi dell’art.16 del C.C.N.L. Comparto Scuola 2006 – 2009, del D.P.R. 28 dicembre 2000, n. 445 e della Legge 12 novembre 2011, n. 183, sotto la propria responsabilità,</p>

      <p class="text-align-center"><strong>DICHIARA&nbsp;</strong></p>

      <p>che il coordinatore è stato già informato della richiesta e provvederà alla copertura e di richiedere il permesso per:</p>
    '#format': bootstrap_italia_2
  dichiarazione:
    '#type': textarea
    '#title': 'Descrizione dei motivi per cui si chiede il permesso'
    '#description_display': before
    '#required': true
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
  data_firma:
    '#type': webform_flexbox
    '#attributes':
      style: 'margin-top: 30px'
    data_compilazione:
      '#type': date
