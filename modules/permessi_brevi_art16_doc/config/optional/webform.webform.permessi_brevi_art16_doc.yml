title: 'Permessi brevi art. 16 - DOCENTI'
description: '<p>Form per la Modulistica del Personale</p>'
categories: {  }
elements: |-
  informazioni:
    '#type': webform_more
    '#more_title': 'Informazioni CCNL (art. 16 Permessi brevi)'
    '#more': '<ol><li data-list-item-id="ed60f0893a4c60ec8e3356e644d1baa5b">Compatibilmente con le esigenze di servizio, al dipendente con contratto a tempo indeterminato e al personale con contratto a tempo determinato, sono attribuiti, per esigenze personali e a domanda, brevi permessi di durata non superiore alla metà dell''orario giornaliero individuale di servizio e, comunque, per il personale docente fino ad un massimo di due ore. Per il personale docente i permessi brevi si riferiscono ad unità minime che siano orarie di lezione.</li><li data-list-item-id="e22c175e6142e025f9eda3bff6b4d3fe1">I permessi complessivamente fruiti non possono eccedere 36 ore nel corso dell''anno scolastico per il personale A.T.A.; per il personale docente il limite corrisponde al rispettivo orario settimanale di insegnamento.</li><li data-list-item-id="ef27bf82800ec75aec37b2c9ec8c05f9e">Entro i due mesi lavorativi successivi a quello della fruizione del permesso, il dipendente è tenuto a recuperare le ore non lavorate in una o più soluzioni in relazione alle esigenze di servizio. Il recupero da parte del personale docente avverrà prioritariamente con riferimento alle supplenze o allo svolgimento di interventi didattici integrativi, con precedenza nella classe dove avrebbe dovuto prestare servizio il docente in permesso.</li><li data-list-item-id="ea5b7262f714aa4d9c5f8f0bd1f2105f7">Nei casi in cui non sia possibile il recupero per fatto imputabile al dipendente, l''Amministrazione provvede a trattenere una somma pari alla retribuzione spettante al dipendente stesso per il numero di ore non recuperate.</li><li data-list-item-id="eafae3f1da9edf3634bfa091ae09ee1f0">Per il personale docente l''attribuzione dei permessi è subordinata alla possibilità della sostituzione con personale in servizio.</li></ol>'
    '#attributes':
      style: 'margin: 20px 0px 50px 0px'
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
  dati_anagrafici:
    '#type': webform_flexbox
    '#align_items': center
    markup:
      '#type': webform_markup
      '#flex': 0
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
      '#markup': '<p>Il/La sottoscritto/a</p>'
    cognome:
      '#type': textfield
      '#title': Cognome
      '#autocomplete': 'off'
      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#flex': 2
      '#default_value': '[current-user:field_cognome]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    nome:
      '#type': textfield
      '#title': Nome
      '#autocomplete': 'off'
      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#flex': 2
      '#default_value': '[current-user:field_nome]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    codice_fiscale:
      '#type': textfield
      '#title': 'Codice Fiscale'
      '#readonly': true
      '#input_mask': "'casing': 'upper'"
      '#default_value': '[current-user:field_codice_fiscale]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
  flexbox:
    '#type': webform_flexbox
    '#attributes':
      style: 'margin-top: 30px'
    sede_di_servizio:
      '#type': textfield
      '#title': 'In servizio presso: '
      '#autocomplete': 'off'
      '#readonly': true
      '#flex': 3
      '#default_value': '[current-user:field_sede_di_servizio]'
      '#format_items': comma
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
    in_qualita_di_:
      '#type': textfield
      '#title': 'In qualità di: '
      '#autocomplete': 'off'
      '#readonly': true
      '#flex': 2
      '#default_value': '[current-user:field_qualifica]'
      '#format_items': comma
